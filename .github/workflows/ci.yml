name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  rust-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust checks
        run: cargo check --lib --no-default-features

  pg-integration-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: base
            extension_features: pg18
          - name: model
            extension_features: "pg18 hybrid_onnx"
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f docker/Dockerfile.test-trixie -t pg-pinyin-test:ci .

      - name: Start test container
        run: |
          docker run -d --name pg-pinyin-test-${{ matrix.name }} \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -e POSTGRES_DB=postgres \
            -v "$GITHUB_WORKSPACE:/work" \
            pg-pinyin-test:ci \
            postgres -c shared_preload_libraries=pg_search

      - name: Run extension install + smoke + pgTAP tests
        run: |
          docker exec -u root pg-pinyin-test-${{ matrix.name }} bash -lc '
            set -euo pipefail
            until pg_isready -h 127.0.0.1 -p 5432 -U postgres >/dev/null 2>&1; do
              sleep 1
            done
            cd /work
            PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config
            if [ ! -x "$PG_CONFIG" ]; then
              PG_CONFIG="$(command -v pg_config)"
            fi
            cargo pgrx init --pg18="$PG_CONFIG"
            cargo pgrx install -v --features "${{ matrix.extension_features }}" --no-default-features --pg-config "$PG_CONFIG"
            bash ./scripts/verify_upgrade_sql.sh \
              /usr/share/postgresql/18/extension/pg_pinyin--0.1.0.sql \
              ./pg_pinyin--0.0.2--0.1.0.sql \
              0.0.2 \
              0.1.0
            cp ./pg_pinyin--0.0.2--0.1.0.sql /usr/share/postgresql/18/extension/pg_pinyin--0.0.2--0.1.0.sql
            VENV_DIR=/tmp/.venv-g2pm-ci ./scripts/export_g2pm_assets.sh --force --output-dir /tmp/g2pm-bundled
            mkdir -p /usr/share/postgresql/18/extension/pg_pinyin/g2pm
            cp -R /tmp/g2pm-bundled/. /usr/share/postgresql/18/extension/pg_pinyin/g2pm/
            psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_pinyin;"
            out="$(psql -At -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "SELECT public.pinyin_word_romanize(\$\$郑爽ABC\$\$)")"
            test "$out" = "zheng shuang abc"
            out_g2pm="$(psql -At -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "SELECT public.pinyin_word_romanize(\$\$重门\$\$, model => '\''g2pm'\'')")"
            test "$out_g2pm" = "chong men"
            PGURL=postgres://postgres@127.0.0.1:5432/postgres ./test/pgtap/run.sh
          '

      - name: Run upgrade validation
        run: |
          CONTAINER=pg-pinyin-test-${{ matrix.name }} EXTENSION_FEATURES="${{ matrix.extension_features }}" bash ./scripts/test_upgrade_pg18.sh pg-pinyin-test-${{ matrix.name }} "${{ matrix.extension_features }}"

      - name: Container logs
        if: always()
        run: docker logs pg-pinyin-test-${{ matrix.name }} || true

      - name: Cleanup container
        if: always()
        run: docker rm -f pg-pinyin-test-${{ matrix.name }} || true
